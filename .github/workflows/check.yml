name: Deliverable integrity

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install rdflib
        run: pip install rdflib

      - name: Run deliverable integrity checks
        run: python scripts/ci_check.py
